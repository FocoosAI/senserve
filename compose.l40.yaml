# Senserve + Open WebUI. Requires NVIDIA Container Toolkit.
#
#   docker compose up --build
#
# Open WebUI: http://localhost:8788  →  Settings → Connections: OpenAI API
#   Base URL http://localhost:8787/v1  (pre-filled via env below)
# Model switch: pick a model in the chat UI (catalog from GET /v1/models).

services:
  senserve:
    build:
      context: .
      dockerfile: Dockerfile.l40
    mem_limit: "118g"
    runtime: nvidia
    ports:
      - "8787:8787"
    environment:
      SENSERVE_API_PORT: "8787"
      SENSERVE_WORKER_BASE_PORT: "8000"
      SENSERVE_SLEEP_MODE: "off"
      SENSERVE_INLINE_REMOTE_MEDIA: "0"
      VLLM_SERVER_DEV_MODE: "1"
      HF_HOME: /root/.cache/huggingface
      #HF_HUB_OFFLINE: "1"
      NVIDIA_VISIBLE_DEVICES: all
      # vLLM worker (aligned with standalone dgx-vllm compose)
      CUDA_VISIBLE_DEVICES: "0"
      NCCL_P2P_DISABLE: "1"
      VLLM_WORKER_MULTIPROC_METHOD: fork
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/vllm:/root/.cache/vllm
      - ./config:/app/config
      - ./datasets:/datasets:ro
    # Default: load Qwen3.5 0.8B (id qwen3.5-0.8b in config/models.yaml)
    command: ["uv", "run", "senserve"]
    # /health returns 200 as soon as the gateway is up (ready may still be false while vLLM starts).
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8787/health"]
      interval: 15s
      timeout: 20s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8788:8080"
    environment:
      # OpenAI-compatible connection to Senserve (model list + chat + hot-swap)
      OPENAI_API_BASE_URL: http://senserve:8787/v1
      OPENAI_API_KEY: sk-senserve-local
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-in-production}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      senserve:
        condition: service_healthy

volumes:
  open-webui-data:
