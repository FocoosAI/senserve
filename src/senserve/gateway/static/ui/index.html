<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Senserve</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>Senserve</h1>
      <p class="subtitle">Operations dashboard</p>
    </div>
    <p id="last-refresh" class="muted">—</p>
  </header>

  <section id="banner-switch" class="banner hidden" role="status"></section>
  <section id="banner-error" class="banner banner-error hidden" role="alert"></section>
  <section id="banner-config-ok" class="banner banner-ok hidden" role="status"></section>

  <section class="cards" id="status-cards" aria-label="System status"></section>

  <section class="summary" id="summary" aria-label="Summary"></section>

  <section class="model-controls" aria-label="Model selection">
    <label class="control-label" for="model-picker">Model</label>
    <select id="model-picker" class="model-picker"></select>
    <button type="button" id="model-load-btn" class="btn">Load</button>
    <button type="button" id="model-warmup-btn" class="btn btn-warmup" title="Simple chat completion to wake the active model">
      Warmup
    </button>
    <span id="warmup-latency" class="warmup-latency muted" aria-live="polite"></span>
  </section>

  <section class="config-editor" aria-label="Catalog configuration">
    <div class="config-header">
      <h2>Configuration</h2>
      <div class="config-actions">
        <button type="button" id="config-add-model-btn" class="btn">Add model</button>
        <button type="button" id="config-save-btn" class="btn btn-primary">Save configuration</button>
      </div>
    </div>
    <p id="config-path" class="muted config-path"></p>

    <h3 class="config-subhead">Global defaults</h3>
    <div class="defaults-grid" id="defaults-form"></div>
    <h4 class="config-subhead-sm">vLLM options (defaults)</h4>
    <div id="defaults-vllm-rows" class="kv-rows"></div>
    <button type="button" id="defaults-vllm-add" class="btn btn-sm">Add option</button>

    <h3 class="config-subhead">Catalog models</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Active</th>
            <th>Capabilities</th>
            <th>Source</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="config-models-body"></tbody>
      </table>
    </div>
  </section>

  <section class="table-wrap runtime-table">
    <h2>Runtime</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Active</th>
          <th>Capabilities</th>
          <th>Port</th>
          <th>PID</th>
          <th>Sleep</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="models-body"></tbody>
    </table>
  </section>

  <dialog id="model-dialog" class="model-dialog">
    <form id="model-form" method="dialog">
      <h3 id="model-dialog-title">Edit model</h3>
      <label>ID <input name="id" required pattern="[a-z0-9][a-z0-9._-]*" /></label>
      <label>Display name <input name="display_name" /></label>
      <label>Source (HF repo or path) <input name="source" required /></label>
      <fieldset class="capabilities-fieldset">
        <legend>Capabilities</legend>
        <label><input type="checkbox" name="cap" value="text" checked /> text</label>
        <label><input type="checkbox" name="cap" value="vision" /> vision</label>
        <label><input type="checkbox" name="cap" value="video" /> video</label>
        <label><input type="checkbox" name="cap" value="image" /> image</label>
      </fieldset>
      <label><input type="checkbox" name="enabled" checked /> Enabled</label>
      <label><input type="checkbox" name="default" /> Default on startup</label>
      <h4>vLLM options (this model)</h4>
      <div id="model-vllm-rows" class="kv-rows"></div>
      <button type="button" id="model-vllm-add" class="btn btn-sm">Add option</button>
      <div class="dialog-actions">
        <button type="button" id="model-dialog-cancel" class="btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Apply</button>
      </div>
    </form>
  </dialog>

  <datalist id="vllm-flag-list"></datalist>

  <script src="app.js"></script>
</body>
</html>
