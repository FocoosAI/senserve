# Model catalog. Override locally via config/models.local.yaml (optional).

defaults:
  worker_port: 8000
  # vLLM flags shared by all models; per-model overrides in each models[].vllm
  tensor_parallel_size: 1
  trust_remote_code: true
  skip_mm_profiling: true
  # max_model_len: auto
  mm_encoder_tp_mode: data
  gpu_memory_utilization: 0.8
  load_format: fastsafetensors
  tool_call_parser: hermes
  enable_auto_tool_choice: true
  "limit-mm-per-prompt.video": 1
  media_io_kwargs: '{"video": {"num_frames": -1}}'
  max_model_len: auto
  allowed_local_media_path: /datasets

  # "structured-outputs-config.backend": guidance
  # "structured-outputs-config.disable_any_whitespace": true
  # "structured-outputs-config.disable_additional_properties": true

models:
  - id: qwen3.5-0.8b
    display_name: Qwen3.5 0.8B
    source: Qwen/Qwen3.5-0.8B
    capabilities: [text, vision, video]
    enabled: true
    default: false
    vllm:
      speculative_config: '{"method": "mtp", "num_speculative_tokens": 3}'

  # id kept for API compatibility; weights are full Instruct (not AWQ).
  - id: qwen3-vl-4b-awq
    display_name: Qwen3-VL 4B Instruct
    source: cpatonn/Qwen3-VL-4B-Instruct-AWQ-4bit
    capabilities: [text, vision, video]
    enabled: true


  - id: qwen3.6-35b-a3b-awq-4bit
    display_name: cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
    source: cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
    capabilities: [text, vision, video]
    enabled: true
    default: false
    vllm:
      gpu_memory_utilization: 0.8
      tool_call_parser: hermes
      enable_auto_tool_choice: true
      max_model_len: 32000
      max_num_seqs: 1


  - id: gemma-4-26b-a4b
    display_name: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
    source: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
    capabilities: [text, image, video]
    enabled: true
    default: false
    vllm:
      gpu_memory_utilization: 0.9
      enable_auto_tool_choice: true
      trust_remote_code: true
      max_num_batched_tokens: 60000
      max_num_seqs: 1
      max_model_len: 32000

  - id: gemma-4-12b-it
    display_name: Gemma 4 12B IT
    source: google/gemma-4-12B-it
    capabilities: [text, vision, video]
    enabled: true
    default: false
    vllm:
      gpu_memory_utilization: 0.9
      max_model_len: 32000
      max_num_seqs: 1

  - id: qwen3-vl-30b-a3b-instruct-awq
    display_name: Qwen3-VL 30B A3B Instruct AWQ
    source: cpatonn/Qwen3-VL-30B-A3B-Instruct-AWQ-4bit
    capabilities: [text, vision, video]
    enabled: true
    default: false
    vllm:
      gpu_memory_utilization: 0.8
      tool_call_parser: hermes
      enable_auto_tool_choice: true
      max_model_len: 22000
      max_num_seqs: 1
  
  - id: marlin-2b 
    display_name: Marlin 2 3B Instruct
    source: NemoStation/Marlin-2B
    capabilities: [text, vision, video]
    enabled: true
    default: true
    vllm:
      gpu_memory_utilization: 0.8
  

