# Model catalog. Override locally via config/models.local.toml (optional).

[defaults]
worker_port = 8000
# vLLM flags (global; per-model [models.vllm] overrides)
tensor_parallel_size = 1
trust_remote_code = true
skip_mm_profiling = true
max_model_len = "auto"
mm_encoder_tp_mode = "data"
gpu_memory_utilization = 0.85
load_format = "fastsafetensors"
tool_call_parser = "hermes"
enable_auto_tool_choice = true
"limit-mm-per-prompt.video" = 1
media_io_kwargs = '{"video": {"num_frames": -1}}'
speculative_config = '{"method": "mtp", "num_speculative_tokens": 3}'
"structured-outputs-config.backend" = "guidance"
"structured-outputs-config.disable_any_whitespace" = true
"structured-outputs-config.disable_additional_properties" = true

[[models]]
id = "qwen3.5-0.8b"
display_name = "Qwen3.5 0.8B"
source = "Qwen/Qwen3.5-0.8B"
capabilities = ["text"]
preprocessor = "none"
enabled = true
default = true

[[models]]
# id kept for API compatibility; weights are full Instruct (not AWQ).
id = "qwen3-vl-4b-awq"
display_name = "Qwen3-VL 4B Instruct"
source = "Qwen/Qwen3-VL-4B-Instruct"
capabilities = ["text", "vision", "video"]
preprocessor = "qwen_vl"
enabled = true

[models.vllm]
# Only set quantization if source is a pre-quantized HF repo (e.g. *-FP8).
# Lower VRAM: source = "Qwen/Qwen3-VL-4B-Instruct-FP8"
max_model_len = 8192

[[models]]
id = "gemma-4-26b-a4b-it"
display_name = "Gemma 4 26B IT"
source = "google/gemma-4-26B-A4B-it"
capabilities = ["text", "image"]
preprocessor = "gemma4"
enabled = true

[models.vllm]
max_model_len = 8192
